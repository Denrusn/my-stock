# Stock Vision — Deploy to GitHub Pages
# Generates static stock data and deploys the dashboard

name: Deploy Stock Vision

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 1-8 * * 1-5'
  push:
    branches: [main]
    paths:
      - 'stock-vision/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache-dependency-path: stock-vision/package-lock.json

      - name: Install dependencies
        working-directory: stock-vision
        run: npm ci

      - name: Generate static data
        working-directory: stock-vision
        run: node scripts/generate-data.mjs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: stock-vision/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
