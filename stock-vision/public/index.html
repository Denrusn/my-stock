<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>Stock Vision</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg-primary: #0a0a1a;
    --bg-secondary: #12122a;
    --card-bg: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.06));
    --card-border: rgba(255,255,255,0.06);
    --green: #00c853;
    --green-light: #69f0ae;
    --red: #ff5252;
    --red-light: #ff8a80;
    --purple: #5c6bc0;
    --purple-light: #7986cb;
    --yellow: #ffd740;
    --text-primary: #e0e0e0;
    --text-secondary: rgba(255,255,255,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, var(--bg-primary), var(--bg-secondary));
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .dashboard { max-width: 1440px; margin: 0 auto; padding: 20px; }

  /* ===== TOP BAR ===== */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 16px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 20px;
  }
  .top-bar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--purple), var(--purple-light));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
  }
  .brand-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--purple-light), #9fa8da);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .top-bar-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .live-date {
    font-size: 13px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: breathe 2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* ===== INDEX GRID ===== */
  .index-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .index-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px;
    cursor: default;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .index-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(92,107,192,0.15);
  }
  .index-name {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .index-price {
    font-size: 22px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .index-change {
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .index-chart {
    margin-top: 8px;
    height: 28px;
    width: 100%;
  }
  .up { color: var(--green); }
  .down { color: var(--red); }

  /* ===== MIDDLE GRID ===== */
  .middle-grid {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .right-col {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
  }

  /* ===== CARD ===== */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(92,107,192,0.1);
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .card-header h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
  }
  .card-body {
    padding: 14px 16px;
  }

  /* ===== TAB GROUP ===== */
  .tab-group {
    display: flex;
    gap: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 2px;
  }
  .tab {
    padding: 4px 12px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: background 0.15s, color 0.15s;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .tab:hover {
    color: var(--text-primary);
    background: rgba(255,255,255,0.06);
  }
  .tab.active {
    background: rgba(92,107,192,0.25);
    color: var(--purple-light);
  }

  /* ===== LOADING SKELETON ===== */
  .loading-skeleton {
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
    animation: skeleton-pulse 1.5s ease-in-out infinite;
  }
  @keyframes skeleton-pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.1; }
  }

  /* ===== WATCHLIST SECTION ===== */
  .watchlist-section {
    margin-bottom: 20px;
  }
  .watchlist-section .card-body {
    padding: 0;
  }
</style>
</head>
<body>
<div class="dashboard" id="app">
  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div style="text-align:center;padding:40vh 0;">
      <div style="font-size:32px;font-weight:700;margin-bottom:12px;">📊 STOCK VISION</div>
      <div style="font-size:14px;color:var(--text-secondary);">正在加载数据...</div>
    </div>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar" id="topBar" style="display:none;">
    <div class="top-bar-left">
      <div class="logo">📊</div>
      <div class="brand-title">STOCK VISION</div>
    </div>
    <div class="top-bar-right">
      <span class="live-date" id="liveDate"></span>
      <span class="status-dot" title="Live"></span>
    </div>
  </div>

  <!-- INDEX GRID -->
  <div class="index-grid" id="indexGrid" style="display:none;">
    <div class="index-card" data-code="000001">
      <div class="index-name">上证指数</div>
      <div class="index-price" id="price-000001">--</div>
      <div class="index-change" id="change-000001">--</div>
      <canvas class="index-chart" id="chart-000001"></canvas>
    </div>
    <div class="index-card" data-code="399001">
      <div class="index-name">深证成指</div>
      <div class="index-price" id="price-399001">--</div>
      <div class="index-change" id="change-399001">--</div>
      <canvas class="index-chart" id="chart-399001"></canvas>
    </div>
    <div class="index-card" data-code="399006">
      <div class="index-name">创业板指</div>
      <div class="index-price" id="price-399006">--</div>
      <div class="index-change" id="change-399006">--</div>
      <canvas class="index-chart" id="chart-399006"></canvas>
    </div>
    <div class="index-card" data-code="000688">
      <div class="index-name">科创50</div>
      <div class="index-price" id="price-000688">--</div>
      <div class="index-change" id="change-000688">--</div>
      <canvas class="index-chart" id="chart-000688"></canvas>
    </div>
  </div>

  <!-- MIDDLE GRID -->
  <div class="middle-grid" id="middleGrid" style="display:none;">
    <!-- Industries -->
    <div class="card" id="industriesCard">
      <div class="card-header">
        <h3>🏭 板块涨幅榜</h3>
        <span style="font-size:12px;color:var(--text-secondary);">周涨跌幅</span>
      </div>
      <div class="card-body" id="industriesBody">
        <div class="loading-skeleton" style="height:200px;"></div>
      </div>
    </div>

    <!-- Right column -->
    <div class="right-col">
      <!-- Northbound -->
      <div class="card" id="northboundCard">
        <div class="card-header">
          <h3>🌐 北向资金</h3>
        </div>
        <div class="card-body" id="northboundBody">
          <div class="loading-skeleton" style="height:80px;"></div>
        </div>
      </div>
      <!-- Sentiment -->
      <div class="card" id="sentimentCard">
        <div class="card-header">
          <h3>📈 市场情绪</h3>
        </div>
        <div class="card-body" id="sentimentBody">
          <div class="loading-skeleton" style="height:80px;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- WATCHLIST SECTION -->
  <div class="watchlist-section" id="watchlistSection" style="display:none;">
    <div class="card">
      <div class="card-header">
        <h3>📋 自选股</h3>
        <div class="tab-group">
          <button class="tab active" data-period="weekly">周K</button>
          <button class="tab" data-period="daily">日K</button>
          <button class="tab" data-period="monthly">月K</button>
        </div>
      </div>
      <div class="card-body" id="watchlistBody"></div>
    </div>
  </div>
</div>
<script>
// ===== CONFIG =====
const API_BASE = '/api';
const INDICES = [
  { code: '000001', name: '上证指数' },
  { code: '399001', name: '深证成指' },
  { code: '399006', name: '创业板指' },
  { code: '000688', name: '科创50' }
];

// ===== STATE =====
const state = {
  quotes: null,
  industries: null,
  northbound: null,
  sentiment: null,
  kline: null
};

// ===== UTILITIES =====
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

function fmt(v) {
  if (v === undefined || v === null || isNaN(v)) return '--';
  return Number(v).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function pct(v) {
  if (v === undefined || v === null || isNaN(v)) return '--';
  const sign = v > 0 ? '+' : '';
  return sign + Number(v).toFixed(2) + '%';
}

function cls(v) {
  if (v === undefined || v === null || isNaN(v)) return '';
  return v >= 0 ? 'up' : 'down';
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

// ===== RENDER: INDEX CARDS =====
function renderIndexCards(data) {
  if (!data || !data.indices) return;
  data.indices.forEach(item => {
    const priceEl = document.getElementById('price-' + item.code);
    const changeEl = document.getElementById('change-' + item.code);
    if (priceEl) priceEl.textContent = fmt(item.price);
    if (changeEl) {
      changeEl.textContent = pct(item.changePercent);
      changeEl.className = 'index-change ' + cls(item.changePercent);
    }
  });
}

// ===== RENDER: INDUSTRIES =====
function renderIndustries(data) {
  var body = document.getElementById('industriesBody');
  if (!data || !data.industries || !data.industries.length) {
    body.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:20px;">暂无数据</div>';
    return;
  }
  var max = Math.max.apply(null, data.industries.map(function(i) { return Math.abs(i.weekChange); }));
  if (max < 0.1) max = 0.1;
  var html = '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 2fr;font-size:11px;color:var(--text-secondary);padding:0 4px 8px 4px;border-bottom:1px solid rgba(255,255,255,0.06);"><span>板块名称</span><span style="text-align:right;">周涨幅</span><span style="text-align:right;">月涨幅</span><span></span></div>';
  for (var i = 0; i < data.industries.length; i++) {
    var ind = data.industries[i];
    var barW = (Math.abs(ind.weekChange) / max * 100).toFixed(0);
    var barColor = ind.weekChange >= 0 ? 'var(--green)' : 'var(--red)';
    var rowStyle = i % 2 === 0 ? 'background:rgba(255,255,255,0.02);border-radius:4px;' : '';
    html += '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 2fr;align-items:center;padding:5px 4px;font-size:12px;' + rowStyle + '">'
      + '<span>' + ind.name + '</span>'
      + '<span style="text-align:right;color:' + (ind.weekChange >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (ind.weekChange > 0 ? '+' : '') + ind.weekChange.toFixed(2) + '%</span>'
      + '<span style="text-align:right;color:' + (ind.monthChange >= 0 ? 'var(--green)' : 'var(--red)') + ';">' + (ind.monthChange > 0 ? '+' : '') + ind.monthChange.toFixed(2) + '%</span>'
      + '<div style="height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;margin-left:8px;"><div style="height:100%;width:' + barW + '%;background:' + barColor + ';border-radius:3px;"></div></div>'
      + '</div>';
  }
  body.innerHTML = html;
}

// ===== RENDER: NORTHBOUND =====
function renderNorthbound(data) {
  var body = document.getElementById('northboundBody');
  if (!data) {
    body.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:10px;">暂无数据</div>';
    return;
  }
  var netDay = data.todayNet || 0;
  var netWeek = data.weekNet || 0;
  var netMonth = data.monthNet || 0;
  var netDayCls = netDay >= 0 ? 'up' : 'down';
  var netWeekCls = netWeek >= 0 ? 'up' : 'down';
  var netMonthCls = netMonth >= 0 ? 'up' : 'down';
  var html = '<div style="display:flex;gap:12px;margin-bottom:10px;">'
    + '<div style="flex:1;text-align:center;"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">今日</div><div class="' + netDayCls + '" style="font-size:18px;font-weight:700;">' + (netDay > 0 ? '+' : '') + netDay.toFixed(2) + '亿</div></div>'
    + '<div style="flex:1;text-align:center;"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">本周</div><div class="' + netWeekCls + '" style="font-size:18px;font-weight:700;">' + (netWeek > 0 ? '+' : '') + netWeek.toFixed(2) + '亿</div></div>'
    + '<div style="flex:1;text-align:center;"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">本月</div><div class="' + netMonthCls + '" style="font-size:18px;font-weight:700;">' + (netMonth > 0 ? '+' : '') + netMonth.toFixed(2) + '亿</div></div>'
    + '</div>';
  // 20-day heatmap bars
  if (data.history && data.history.length) {
    var maxAbs = 0.1;
    for (var i = 0; i < data.history.length; i++) {
      var absVal = Math.abs(data.history[i].net);
      if (absVal > maxAbs) maxAbs = absVal;
    }
    html += '<div style="display:flex;gap:3px;align-items:flex-end;height:32px;padding:0 2px;">';
    for (var j = 0; j < data.history.length; j++) {
      var net = data.history[j].net;
      var barHeight = (Math.abs(net) / maxAbs * 28).toFixed(0);
      if (Number(barHeight) < 2) barHeight = '2';
      var barColor = net >= 0 ? 'var(--green)' : 'var(--red)';
      var opacity = (Math.abs(net) / maxAbs * 0.5 + 0.3).toFixed(2);
      html += '<div style="width:12px;height:' + barHeight + 'px;background:' + barColor + ';opacity:' + opacity + ';border-radius:2px 2px 0 0;flex-shrink:0;"></div>';
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

// ===== RENDER: SENTIMENT =====
function renderSentiment(data) {
  var body = document.getElementById('sentimentBody');
  if (!data) {
    body.innerHTML = '<div style="color:var(--text-secondary);text-align:center;padding:10px;">暂无数据</div>';
    return;
  }
  var zt = data.ztCount || 0;
  var dt = data.dtCount || 0;
  var vol = data.totalVolume || 0;
  var other = Math.max(zt + dt > 0 ? 100 - zt - dt : 100, 0);
  var html = '<div style="display:flex;align-items:center;gap:12px;">'
    + '<div style="flex:1;text-align:center;"><div style="font-size:11px;color:var(--green);margin-bottom:4px;">涨停</div><div style="font-size:20px;font-weight:700;color:var(--green);">' + zt + '</div></div>'
    + '<div style="flex:1;text-align:center;"><div style="font-size:11px;color:var(--red);margin-bottom:4px;">跌停</div><div style="font-size:20px;font-weight:700;color:var(--red);">' + dt + '</div></div>'
    + '<div style="flex:1;text-align:center;"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">总量</div><div style="font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;">' + Number(vol).toLocaleString('zh-CN') + '</div></div>'
    + '<div style="width:80px;height:80px;"><canvas id="sentimentDoughnut" width="80" height="80"></canvas></div>'
    + '</div>';
  body.innerHTML = html;
  setTimeout(function() {
    var ctx = document.getElementById('sentimentDoughnut');
    if (!ctx) return;
    if (window._sentimentChart) window._sentimentChart.destroy();
    window._sentimentChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['涨停', '跌停', '其他'],
        datasets: [{
          data: [zt, dt, other],
          backgroundColor: ['#00c853', '#ff5252', 'rgba(255,255,255,0.05)'],
          borderWidth: 0
        }]
      },
      options: { cutout: '60%', plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: true }
    });
  }, 50);
}

// ===== REFRESH ALL =====
async function refreshAll() {
  try {
    const data = await fetchJSON(API_BASE + '/quotes');
    state.quotes = data;
    renderIndexCards(data);

    // Industries
    try {
      const indData = await fetchJSON(API_BASE + '/industries');
      state.industries = indData;
      renderIndustries(indData);
    } catch (e) { console.error('industries error:', e); }

    // Northbound
    try {
      const nbData = await fetchJSON(API_BASE + '/northbound');
      state.northbound = nbData;
      renderNorthbound(nbData);
    } catch (e) { console.error('northbound error:', e); }

    // Sentiment
    try {
      const sentData = await fetchJSON(API_BASE + '/sentiment');
      state.sentiment = sentData;
      renderSentiment(sentData);
    } catch (e) { console.error('sentiment error:', e); }

    // Hide loading screen on first successful fetch
    const loading = document.getElementById('loadingScreen');
    if (loading && loading.style.display !== 'none') {
      loading.style.display = 'none';
      document.getElementById('topBar').style.display = '';
      document.getElementById('indexGrid').style.display = '';
      document.getElementById('middleGrid').style.display = '';
      document.getElementById('watchlistSection').style.display = '';
    }
  } catch (err) {
    console.error('refreshAll error:', err);
  }
}

// ===== SET LIVE DATE =====
function setLiveDate() {
  const now = new Date();
  const opts = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
  document.getElementById('liveDate').textContent = now.toLocaleDateString('zh-CN', opts);
}

// ===== INIT =====
refreshAll();
setInterval(refreshAll, 30000);
setLiveDate();
setInterval(setLiveDate, 60000);
</script>
</body>
</html>
